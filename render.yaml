services:
  - type: web
    name: wa-tg-bot
    env: docker
    plan: free # Change to 'starter' if using a persistent disk
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_GROUP_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DB_ENCRYPTION_KEY
        generateValue: true
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: "/usr/bin/chromium"
      - key: DB_PATH
        value: "/app/data/bot.db"
      - key: DATA_PATH
        value: "/app/data"
      - key: AUTO_REPLY_DELAY_MS
        value: "20000"
      - key: PORT
        value: "3000"
      - key: HEALTH_PORT
        value: "3000"
    # To use a persistent disk ($7/mo Starter Plan), uncomment the section below:
    # disk:
    #   name: data
    #   mountPath: /app/data
    #   sizeGB: 1
